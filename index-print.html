    .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

      position: relative;
      overflow: hidden;
    }
    .page-hero-logo {
      font-family: var(--font); font-size: 22px; font-weight: 700;
      letter-spacing: -0.5px; margin-bottom: 56px;
    }
    .page-hero-logo .k { color: var(--blue); }

    .hero-eyebrow {

      color: var(--cyan); letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 20px;

    .hero-headline {

      line-height: 1.08; letter-spacing: -1.5px;

    .hero-sub {

    .hero-cta-block { display: flex; flex-direction: column; gap: 10px; }

      width: fit-content;

      border: 1px solid var(--border);
      background: var(--bg2);
      position: relative; overflow: hidden;

      position: absolute; inset: 0;

      background-size: 40px 40px;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(60px);
    }
    .orb-1 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(37,99,235,0.4), transparent);
      top: 20%; left: 20%;

    .orb-2 {
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(6,182,212,0.3), transparent);
      bottom: 25%; right: 20%;

    .hero-badge {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(10,10,10,0.8);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;

    .badge-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .badge-text { font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .badge-text strong { color: var(--text); }
    .hero-badge2 {
      position: absolute; top: 20px; right: 20px;
      background: rgba(10,10,10,0.8);
      border: 1px solid var(--border); border-radius: 10px;

    .timeline-num {

    .timeline-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .timeline-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .timeline-badge {

    .why-col-left .why-icon { color: #ef4444; }
