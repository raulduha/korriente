<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korriente — automatización · inteligencia · flujo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #161616;
      --blue: #2563eb;
      --blue-dim: #1d4ed8;
      --cyan: #06b6d4;
      --text: #f0f0f0;
      --muted: #888;
      --border: rgba(255,255,255,0.07);
      --card-bg: rgba(255,255,255,0.03);
      --font: 'Space Grotesk', sans-serif;
      --mono: 'Space Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    ::selection { background: rgba(37,99,235,0.3); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Fade-in animation */
    .fade-in { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-in.visible { opacity: 1; transform: none; }
    .fade-in-delay-1 { transition-delay: 0.1s; }
    .fade-in-delay-2 { transition-delay: 0.2s; }
    .fade-in-delay-3 { transition-delay: 0.3s; }
    .fade-in-delay-4 { transition-delay: 0.4s; }
    .fade-in-delay-5 { transition-delay: 0.5s; }
    .fade-in-delay-6 { transition-delay: 0.6s; }
    .fade-in-delay-7 { transition-delay: 0.7s; }

    /* Layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    section { padding: 96px 0; }

    /* NAVBAR */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 18px 0;
      transition: background 0.3s, border-color 0.3s, backdrop-filter 0.3s;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; text-decoration: none; }
    .logo .k { color: var(--blue); }
    .logo .rest { color: var(--text); }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a {
      color: var(--muted); font-size: 14px; text-decoration: none;
      transition: color 0.2s; font-weight: 500;
    }
    .nav-links a:hover { color: var(--text); }
    .btn-wa-nav {
      display: flex; align-items: center; gap: 8px;
      background: var(--blue); color: #fff;
      padding: 8px 18px; border-radius: 8px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-wa-nav:hover { background: var(--blue-dim); transform: translateY(-1px); }
    .nav-mobile-toggle {
      display: none; background: none; border: none; cursor: pointer;
      color: var(--text); padding: 4px;
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column; align-items: flex-start;
        position: absolute; top: 100%; left: 0; right: 0;
        background: rgba(10,10,10,0.97); backdrop-filter: blur(20px);
        padding: 20px 24px; gap: 20px;
        border-bottom: 1px solid var(--border);
      }
      .nav-mobile-toggle { display: block; }
    }

    /* HERO */
    #hero {
      min-height: 100vh; display: flex; align-items: center;
      padding-top: 100px; padding-bottom: 80px;
      position: relative; overflow: hidden;
    }
    .hero-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: center;
    }
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr; gap: 48px; }
      .hero-visual { order: -1; }
    }
    .hero-eyebrow {
      font-family: var(--mono); font-size: 11px; font-weight: 400;
      color: var(--cyan); letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 20px;
    }
    .hero-headline {
      font-size: clamp(36px, 5vw, 64px); font-weight: 700;
      line-height: 1.08; letter-spacing: -1.5px;
      color: var(--text); margin-bottom: 24px;
      text-wrap: balance;
    }
    .hero-headline .accent { color: var(--blue); }
    .hero-sub {
      font-size: 18px; color: var(--muted); line-height: 1.7;
      margin-bottom: 36px; max-width: 460px;
      text-wrap: pretty;
    }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--blue); color: #fff;
      padding: 14px 26px; border-radius: 10px;
      font-size: 15px; font-weight: 600; text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      background: var(--blue-dim); transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(37,99,235,0.35);
    }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--text);
      padding: 14px 26px; border-radius: 10px;
      font-size: 15px; font-weight: 600; text-decoration: none;
      border: 1px solid var(--border);
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
    }
    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      transform: translateY(-2px);
    }

    /* Abstract visual */
    .hero-visual {
      position: relative; display: flex; align-items: center; justify-content: center;
      height: 420px;
    }
    .hero-visual-inner {
      position: relative; width: 100%; height: 100%; border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg2);
    }
    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(60px); animation: pulse 4s ease-in-out infinite;
    }
    .orb-1 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(37,99,235,0.4), transparent);
      top: 20%; left: 20%;
    }
    .orb-2 {
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(6,182,212,0.3), transparent);
      bottom: 25%; right: 20%;
      animation-delay: 1.5s; animation-duration: 5s;
    }
    .orb-3 {
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
      top: 60%; left: 50%;
      animation-delay: 0.75s; animation-duration: 3.5s;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1) translate(0,0); opacity: 0.8; }
      50% { transform: scale(1.15) translate(8px, -8px); opacity: 1; }
    }
    .flow-lines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 20px,
        rgba(255,255,255,0.012) 20px,
        rgba(255,255,255,0.012) 21px
      );
    }
    .hero-visual-badge {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(10,10,10,0.8); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    }
    .badge-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .badge-text { font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .badge-text strong { color: var(--text); }
    .hero-visual-badge2 {
      position: absolute; top: 20px; right: 20px;
      background: rgba(10,10,10,0.8); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px;
    }
    .badge2-label { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .badge2-value { font-size: 22px; font-weight: 700; color: var(--cyan); line-height: 1.2; }
    .badge2-sub { font-size: 11px; color: var(--muted); }

    /* SOCIAL PROOF BAR */
    #social-proof {
      padding: 32px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    .proof-bar { display: flex; align-items: center; gap: 48px; flex-wrap: wrap; justify-content: center; }
    .proof-item { display: flex; align-items: center; gap: 10px; }
    .proof-num { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--text); }
    .proof-label { font-size: 13px; color: var(--muted); }
    .proof-sep { width: 1px; height: 32px; background: var(--border); }
    @media (max-width: 600px) { .proof-sep { display: none; } }

    /* SERVICES */
    #services { background: var(--bg); }
    .section-header { text-align: center; margin-bottom: 56px; }
    .section-tag {
      font-family: var(--mono); font-size: 11px; color: var(--cyan);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
    }
    .section-title {
      font-size: clamp(28px, 4vw, 42px); font-weight: 700;
      letter-spacing: -0.8px; text-wrap: balance; line-height: 1.15;
    }
    .section-sub { font-size: 17px; color: var(--muted); margin-top: 14px; text-wrap: pretty; }
    .services-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .service-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 26px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      cursor: default;
    }
    .service-card:hover {
      border-color: rgba(37,99,235,0.3);
      background: rgba(37,99,235,0.04);
      transform: translateY(-3px);
    }
    .service-icon {
      width: 40px; height: 40px;
      background: rgba(37,99,235,0.12);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; color: var(--blue);
      transition: background 0.25s;
    }
    .service-card:hover .service-icon { background: rgba(37,99,235,0.2); }
    .service-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .service-pain {
      font-size: 12px; color: var(--cyan); font-family: var(--mono);
      margin-bottom: 10px; letter-spacing: 0.3px;
    }
    .service-desc { font-size: 14px; color: var(--muted); line-height: 1.6; text-wrap: pretty; }

    /* HOW WE WORK */
    #how { background: var(--bg2); }
    .timeline {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0; position: relative; margin-top: 56px;
    }
    .timeline::before {
      content: ''; position: absolute;
      top: 28px; left: calc(12.5% + 20px); right: calc(12.5% + 20px);
      height: 1px; background: linear-gradient(90deg, var(--blue), var(--cyan));
      z-index: 0;
    }
    @media (max-width: 700px) {
      .timeline { grid-template-columns: 1fr; gap: 32px; }
      .timeline::before { display: none; }
    }
    .timeline-step { text-align: center; position: relative; padding: 0 16px; }
    .timeline-dot {
      width: 56px; height: 56px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      position: relative; z-index: 1;
      color: var(--blue); font-size: 20px;
      transition: border-color 0.3s, background 0.3s;
    }
    .timeline-step:hover .timeline-dot {
      border-color: var(--blue); background: rgba(37,99,235,0.12);
    }
    .timeline-num {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .timeline-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .timeline-desc { font-size: 13px; color: var(--muted); line-height: 1.6; text-wrap: pretty; }
    .timeline-badge {
      display: inline-block; margin-top: 10px;
      font-family: var(--mono); font-size: 11px;
      background: rgba(6,182,212,0.1); color: var(--cyan);
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid rgba(6,182,212,0.2);
    }

    /* WHY KORRIENTE */
    #why { background: var(--bg); }
    .why-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 48px; align-items: start; margin-top: 56px;
    }
    @media (max-width: 800px) { .why-grid { grid-template-columns: 1fr; } }
    .why-col-header {
      font-size: 13px; font-family: var(--mono); letter-spacing: 1px;
      text-transform: uppercase; padding-bottom: 14px;
      border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .why-col-left .why-col-header { color: var(--muted); }
    .why-col-right .why-col-header { color: var(--cyan); }
    .why-row {
      display: flex; gap: 14px; padding: 16px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .why-row:last-child { border-bottom: none; }
    .why-icon { flex-shrink: 0; margin-top: 2px; }
    .why-text strong { font-size: 14px; display: block; margin-bottom: 3px; }
    .why-text span { font-size: 13px; color: var(--muted); }
    .why-col-left .why-icon { color: #ef4444; }
    .why-col-right .why-icon { color: #22c55e; }

    /* CTA */
    #cta {
      background: var(--bg2);
      text-align: center;
    }
    .cta-inner {
      max-width: 680px; margin: 0 auto;
      padding: 72px 32px;
      background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(6,182,212,0.05));
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: 20px;
    }
    .cta-headline {
      font-size: clamp(26px, 4vw, 42px); font-weight: 700;
      letter-spacing: -0.8px; margin-bottom: 16px; line-height: 1.15;
      text-wrap: balance;
    }
    .cta-sub { font-size: 16px; color: var(--muted); margin-bottom: 36px; text-wrap: pretty; }
    .cta-number {
      display: block; font-family: var(--mono); font-size: 14px;
      color: var(--muted); margin-top: 20px;
    }
    .cta-number a { color: var(--text); text-decoration: none; transition: color 0.2s; }
    .cta-number a:hover { color: var(--cyan); }
    .btn-primary-large {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--blue); color: #fff;
      padding: 16px 36px; border-radius: 12px;
      font-size: 17px; font-weight: 700; text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary-large:hover {
      background: var(--blue-dim); transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(37,99,235,0.4);
    }

    /* FOOTER */
    footer {
      padding: 40px 0;
      border-top: 1px solid var(--border);
    }
    .footer-inner {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-left .tagline { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
    .footer-right { display: flex; align-items: center; gap: 20px; }
    .footer-link { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-link:hover { color: var(--text); }
    .footer-wa {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; color: var(--text); text-decoration: none;
      transition: color 0.2s;
    }
    .footer-wa:hover { color: var(--cyan); }

    /* SVG icons */
    svg { display: block; }
  </style>
</head>

<div id="root"></div>

// ---- useFadeIn hook ----
function useFadeIn(threshold = 0.15) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); observer.unobserve(el); } },
      { threshold }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  return ref;
}

      </div>
      <div style={rowStyle}>
        <span style={labelStyle}>FONDO BASE</span>
        <div style={colorRowStyle}>
          <input type="color" value={tweaks.bgColor} onChange={e => apply('bgColor', e.target.value)}
            style={{ width: 36, height: 32, border: 'none', background: 'none', cursor: 'pointer', borderRadius: 6 }} />
          <span style={{ fontSize: 12, color: '#888', fontFamily: 'Space Mono, monospace' }}>{tweaks.bgColor}</span>
        </div>
      </div>
      <div style={rowStyle}>
        <span style={labelStyle}>BADGE VISUAL HERO</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <input type="checkbox" checked={tweaks.showBadge} onChange={e => apply('showBadge', e.target.checked)}
            id="badge-toggle" style={{ accentColor: tweaks.primaryColor, width: 16, height: 16, cursor: 'pointer' }} />
          <label htmlFor="badge-toggle" style={{ fontSize: 13, color: '#888', cursor: 'pointer' }}>Mostrar indicadores</label>
        </div>
      </div>
    </div>
  );
}

const tweaksRoot = document.createElement('div');
document.body.appendChild(tweaksRoot);
ReactDOM.createRoot(tweaksRoot).render(<TweaksPanel />);
</script>

</body>
</html>
